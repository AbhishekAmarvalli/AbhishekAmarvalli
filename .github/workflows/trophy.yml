name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate trophies
        uses: ryo-ma/github-profile-trophy@main
        with:
          username: AbhishekAmarvalli
          output: profile-trophy.svg
          theme: discord
          column: 7
          margin-w: 8
          margin-h: 8

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-trophy.svg
          git commit -m "Update trophy SVG" || echo "No changes"
          git push
