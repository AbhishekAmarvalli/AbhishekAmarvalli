name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophies
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: AbhishekAmarvalli
          file: profile-trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: discord
          max-cols: 7
          margin-width: 8
          margin-height: 8

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-trophy.svg
          git commit -m "Update trophy SVG" || echo "No changes"
          git push
